name: E2E Tests

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Kafka ${{ matrix.kafka-version }})
    runs-on: ubuntu-latest
    env:
      KAFKA_VERSION: ${{ matrix.kafka-version }}
    strategy:
      fail-fast: false
      matrix:
        kafka-version:
          - "4.2.0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client podman

      - name: Generate SSH key
        id: ssh-key
        run: |
          mkdir -p /tmp/ssh-test
          ssh-keygen -t ed25519 -f /tmp/ssh-test/id_ed25519 -N ""
          echo "key-path=/tmp/ssh-test/id_ed25519" >> "$GITHUB_OUTPUT"

      - name: Generate TLS certificates
        id: tls-certs
        run: |
          TLS_DIR=$(mktemp -d)
          chmod 755 "${TLS_DIR}"

          # Generate CA key and certificate
          openssl req -new -x509 -keyout "${TLS_DIR}/ca-key" -out "${TLS_DIR}/ca-cert" \
            -days 365 -passout pass:capass \
            -subj "/CN=TestCA"

          # Generate server keystore and key
          keytool -keystore "${TLS_DIR}/kafka.server.keystore.jks" \
            -alias localhost -keyalg RSA -validity 365 \
            -storepass keystorepass -keypass keystorepass \
            -dname "CN=localhost" -genkeypair

          # Create CSR
          keytool -keystore "${TLS_DIR}/kafka.server.keystore.jks" \
            -alias localhost -certreq -file "${TLS_DIR}/server-cert-sign-request" \
            -storepass keystorepass -keypass keystorepass

          # Sign server cert with CA
          openssl x509 -req -CA "${TLS_DIR}/ca-cert" -CAkey "${TLS_DIR}/ca-key" \
            -in "${TLS_DIR}/server-cert-sign-request" \
            -out "${TLS_DIR}/server-cert-signed" \
            -days 365 -CAcreateserial -passin pass:capass

          # Import CA cert into keystore
          keytool -keystore "${TLS_DIR}/kafka.server.keystore.jks" \
            -alias CARoot -importcert -file "${TLS_DIR}/ca-cert" \
            -storepass keystorepass -noprompt

          # Import signed server cert into keystore
          keytool -keystore "${TLS_DIR}/kafka.server.keystore.jks" \
            -alias localhost -importcert -file "${TLS_DIR}/server-cert-signed" \
            -storepass keystorepass -keypass keystorepass -noprompt

          # Create truststore with CA cert
          keytool -keystore "${TLS_DIR}/kafka.server.truststore.jks" \
            -alias CARoot -importcert -file "${TLS_DIR}/ca-cert" \
            -storepass truststorepass -noprompt

          # Write credential files for apache/kafka image
          printf "keystorepass" > "${TLS_DIR}/keystore_creds"
          printf "keystorepass" > "${TLS_DIR}/key_creds"
          printf "truststorepass" > "${TLS_DIR}/truststore_creds"

          # Export CA cert as PEM for the CLI client
          cp "${TLS_DIR}/ca-cert" "${TLS_DIR}/ca-cert.pem"

          echo "tls-certs-path=${TLS_DIR}" >> "$GITHUB_OUTPUT"
          echo "ca-cert-path=${TLS_DIR}/ca-cert.pem" >> "$GITHUB_OUTPUT"

      - name: Prepare k8s manifest
        run: |
          sed -i "s|PLACEHOLDER_SSH_PUBLIC_KEY|$(cat /tmp/ssh-test/id_ed25519.pub)|" test/e2e/kafka/pod.yaml
          sed -i "s|PLACEHOLDER_SSHD_CONFIG_PATH|${{ github.workspace }}/test/e2e/kafka/ssh/sshd_config.d|" test/e2e/kafka/pod.yaml
          sed -i "s|PLACEHOLDER_SASL_CONFIG_PATH|${{ github.workspace }}/test/e2e/kafka/sasl|" test/e2e/kafka/pod.yaml
          sed -i "s|PLACEHOLDER_TLS_CERTS_PATH|${{ steps.tls-certs.outputs.tls-certs-path }}|" test/e2e/kafka/pod.yaml

      - name: Start podman pod
        run: |
          if [ -f ./kafka ]; then mv ./kafka /tmp/kafka-binary; fi
          podman kube play --build=false test/e2e/kafka/pod.yaml
          if [ -f /tmp/kafka-binary ]; then mv /tmp/kafka-binary ./kafka; fi
        timeout-minutes: 5

      - name: Wait for Kafka to be ready
        run: |
          echo "Checking kafka..."
          for i in $(seq 1 30); do
            if podman exec kafka-ssh-kafka-ssh-test /opt/kafka/bin/kafka-topics.sh \
               --bootstrap-server 127.0.0.1:9092 --list 2>/dev/null; then
              echo "kafka is ready"
              break
            fi
            echo "  retry $i..."
            sleep 5
          done

      - name: Wait for SSH to be ready
        run: |
          echo "Checking SSH..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
               -i /tmp/ssh-test/id_ed25519 -p 2222 \
               kafkauser@127.0.0.1 echo "ready" 2>/dev/null; then
              echo "SSH is ready"
              break
            fi
            echo "  retry $i..."
            sleep 3
          done

      - name: Run E2E tests
        env:
          SSH_TEST_KEY_PATH: ${{ steps.ssh-key.outputs.key-path }}
          KAFKA_CLI_BINARY: ${{ github.workspace }}/kafka
          TLS_TEST_CA_CERT: ${{ steps.tls-certs.outputs.ca-cert-path }}
        run: |
          go build -o ./kafka ./cmd/kafka
          go test -v -timeout 300s ./test/e2e/...

      - name: Collect pod logs on failure
        if: failure()
        run: |
          podman logs kafka-ssh-ssh || true
          podman logs kafka-ssh-kafka-ssh-test || true

      - name: Stop pod
        if: always()
        run: |
          podman kube down test/e2e/kafka/pod.yaml || true
