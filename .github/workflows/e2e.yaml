name: E2E Tests

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E (Kafka ${{ matrix.kafka-version }})
    runs-on: ubuntu-latest
    env:
      KAFKA_VERSION: ${{ matrix.kafka-version }}
    strategy:
      fail-fast: false
      matrix:
        kafka-version:
          - "4.2.0"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client podman

      - name: Generate SSH key
        id: ssh-key
        run: |
          mkdir -p /tmp/ssh-test
          ssh-keygen -t ed25519 -f /tmp/ssh-test/id_ed25519 -N ""
          echo "key-path=/tmp/ssh-test/id_ed25519" >> "$GITHUB_OUTPUT"

      - name: Generate TLS certificates
        id: tls-certs
        run: bash test/e2e/scripts/generate-tls-certs.sh

      - name: Prepare k8s manifest
        run: |
          sed -i "s|PLACEHOLDER_SSH_PUBLIC_KEY|$(cat /tmp/ssh-test/id_ed25519.pub)|" test/e2e/kafka/pod.yaml
          sed -i "s|PLACEHOLDER_SSHD_CONFIG_PATH|${{ github.workspace }}/test/e2e/kafka/ssh/sshd_config.d|" test/e2e/kafka/pod.yaml
          sed -i "s|PLACEHOLDER_SASL_CONFIG_PATH|${{ github.workspace }}/test/e2e/kafka/sasl|" test/e2e/kafka/pod.yaml
          sed -i "s|PLACEHOLDER_TLS_CERTS_PATH|${{ steps.tls-certs.outputs.tls-certs-path }}|" test/e2e/kafka/pod.yaml

      - name: Start podman pod
        run: |
          podman kube play --build=false test/e2e/kafka/pod.yaml
        timeout-minutes: 5

      - name: Wait for Kafka to be ready
        run: bash test/e2e/scripts/wait-for-kafka.sh

      - name: Wait for SSH to be ready
        run: bash test/e2e/scripts/wait-for-ssh.sh

      - name: Run E2E tests
        env:
          SSH_TEST_KEY_PATH: ${{ steps.ssh-key.outputs.key-path }}
          KAFKA_CLI_BINARY: ${{ github.workspace }}/kafka
          TLS_TEST_CA_CERT: ${{ steps.tls-certs.outputs.ca-cert-path }}
        run: |
          go build -o ./kafka ./cmd/kafka
          go test -v -timeout 300s ./test/e2e/...

      - name: Collect pod logs on failure
        if: failure()
        run: |
          podman logs kafka-ssh-ssh || true
          podman logs kafka-ssh-kafka-ssh-test || true

      - name: Stop pod
        if: always()
        run: |
          podman kube down test/e2e/kafka/pod.yaml || true
